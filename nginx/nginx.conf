# Nginx 反向代理配置
# 作用：让用户只访问 80 端口，Nginx 自动把请求转发给前端或后端

events {
    worker_connections 1024;  # 每个 worker 进程最大并发连接数
}

http {
    # 定义后端服务器地址（对应 docker-compose 中的服务名）
    upstream backend {
        server backend:8000;  # 后端容器名:端口
    }

    # 定义前端服务器地址
    upstream frontend {
        server frontend:5173;  # 前端容器名:端口
    }

    # 允许上传最大 20MB 的请求体（图片转 base64 后体积约为原文件的 1.33 倍，20MB 可支持约 15MB 原图）
    client_max_body_size 20m;

    server {
        listen 80;  # 监听 80 端口（HTTP 标准端口）

        # 所有以 /api 开头的请求 → 转发给后端
        location /api {
            proxy_pass http://backend;
            proxy_set_header Host $host;                    # 保留原始域名
            proxy_set_header X-Real-IP $remote_addr;        # 传递真实客户端 IP
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # 视频生成（Veo API）最长需要约 5 分钟，延长代理超时时间
            proxy_read_timeout 600s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 600s;
        }

        # /docs 和 /openapi.json 是 FastAPI 自动生成的 API 文档路径
        location /docs {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            proxy_pass http://backend;
            proxy_set_header Host $host;
        }

        # 其余所有请求 → 转发给前端
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # 支持 Vite 热更新的 WebSocket 连接
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
